replicaCount: 2
 
image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/securebank/account-service
  tag: latest
  pullPolicy: IfNotPresent
 
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
 
resources:
  requests:
    memory: '256Mi'
    cpu: '200m'
  limits:
    memory: '512Mi'
    cpu: '500m'
 
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65
 
ingress:
  enabled: true
  host: api.securebank.com
 
environment: dev
secretName: banking-secrets
